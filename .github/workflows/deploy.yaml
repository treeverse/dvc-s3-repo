name: Deploy deb/rpm to s3 repo
on:
  push:
    branches: main
  pull_request: {}
  workflow_dispatch:
jobs:
  pkgs:
    name: ${{ matrix.pkg }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - pkg: deb
            build_context: docker/deb
            upload_context: docker/deb
          - pkg: rpm
            build_context: docker/rpm-builder
            upload_context: docker/rpm-uploader
    environment: aws
    permissions:
      contents: read
      id-token: write
      packages: write
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Read DVC version
      run: echo "DVC_VERSION=$(<dvc_version.txt)" >> "$GITHUB_ENV"
    - name: Checkout specific version of dvc
      uses: actions/checkout@v6
      with:
          repository: treeverse/dvc
          ref: ${{ env.DVC_VERSION }}
          path: dvc
          persist-credentials: false
          fetch-depth: 0

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Login to GHCR
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build Docker image
      uses: docker/build-push-action@v7
      with:
        context: ${{ matrix.build_context }}
        load: true
        tags: ${{ matrix.pkg }}
        cache-from: |
          type=gha,scope=${{ matrix.pkg }}
          type=registry,ref=ghcr.io/${{ github.repository }}/cache:${{ matrix.pkg }}
        cache-to: |
          type=gha,scope=${{ matrix.pkg }},mode=max
          type=registry,ref=ghcr.io/${{ github.repository }}/cache:${{ matrix.pkg }},mode=max
    - name: Write build marker
      run: echo 'PKG = "${{ matrix.pkg }}"' > dvc/dvc/_build.py
    - name: Build
      run: >
        docker run --rm
        -v ${{ github.workspace }}:/dvc-s3-repo
        -w /dvc-s3-repo
        ${{ matrix.pkg }}
        ./build.sh ${{ matrix.pkg }}
    - name: Test
      run: >
        docker run --rm
        -v ${{ github.workspace }}:/dvc-s3-repo
        -w /dvc-s3-repo
        ${{ matrix.pkg }}
        ./test.sh ${{ matrix.pkg }}

    - uses: aws-actions/configure-aws-credentials@v6
      with:
        aws-region: us-east-2
        role-to-assume: arn:aws:iam::977611293394:role/dvc-s3-repo-deploy-${{ matrix.pkg }}
    - name: Build uploader image
      if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && startsWith(github.event.head_commit.message, 'updated dvc to') }}
      uses: docker/build-push-action@v7
      with:
        context: ${{ matrix.upload_context }}
        load: true
        tags: ${{ matrix.pkg }}-uploader
        cache-from: |
          type=gha,scope=${{ matrix.pkg }}-uploader
          type=registry,ref=ghcr.io/${{ github.repository }}/cache:${{ matrix.pkg }}-uploader
        cache-to: |
          type=gha,scope=${{ matrix.pkg }}-uploader,mode=max
          type=registry,ref=ghcr.io/${{ github.repository }}/cache:${{ matrix.pkg }}-uploader,mode=max
    - name: Upload
      if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && startsWith(github.event.head_commit.message, 'updated dvc to') }}
      env:
        GPG_ITERATIVE_ASC: ${{ secrets.GPG_ITERATIVE_ASC }}
        GPG_ITERATIVE_PASS: ${{ secrets.GPG_ITERATIVE_PASS }}
        AWS_S3_BUCKET: dvc-packages
        AWS_S3_PREFIX: ${{ matrix.pkg }}
      run: >
        docker run --rm
        -v ${{ github.workspace }}:/dvc-s3-repo
        -w /dvc-s3-repo/${{ matrix.pkg }}
        -e AWS_ACCESS_KEY_ID
        -e AWS_SECRET_ACCESS_KEY
        -e AWS_SESSION_TOKEN
        -e AWS_DEFAULT_REGION
        -e AWS_S3_BUCKET
        -e AWS_S3_PREFIX
        -e GPG_ITERATIVE_ASC
        -e GPG_ITERATIVE_PASS
        ${{ matrix.pkg }}-uploader
        ./upload.sh

  notify:
    if: github.ref == 'refs/heads/main' && failure()
    needs: [pkgs]
    runs-on: ubuntu-latest
    steps:
    - name: Slack Notification
      uses: rtCamp/action-slack-notify@v2.3.3
      env:
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        SLACK_COLOR: ${{ job.status }}
        SLACK_MESSAGE: 'Package build failed for ${{ github.repository }}'
        SLACK_TITLE: CI Status
        SLACK_USERNAME: dvc-pkg-build
