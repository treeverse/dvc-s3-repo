name: Update package
on:
  push:
    branches: main
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: get latest dvc version
      id: latest
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        version=$(gh release list -R treeverse/dvc --json name,isLatest --jq '.[] | select(.isLatest)|.name')
        echo "$version" > dvc_version.txt
        echo "version=$version" >> "$GITHUB_OUTPUT"
    - name: create PR
      id: create-pr
      uses: peter-evans/create-pull-request@v8
      with:
        commit-message: updated dvc to ${{ steps.latest.outputs.version }}
        title: dvc ${{ steps.latest.outputs.version }}
        # token: ${{ secrets.OLIVAW_PAT }}
        # author: Iterative Olivaw <support@iterative.ai>
    # - name: Merge the PR
    #   if: ${{ steps.update.outputs.changes != '' }}
    #   run: gh pr merge --squash --delete-branch --auto ${{ steps.create-pr.outputs.pull-request-url }}
    #   env:
    #     GITHUB_TOKEN: ${{ secrets.OLIVAW_PAT }}

    - name: Send message to slack
      if: failure()
      uses: rtCamp/action-slack-notify@v2.3.3
      env:
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        SLACK_COLOR: ${{ job.status }}
        SLACK_MESSAGE: 'Package update failed for ${{ github.repository }}'
        SLACK_TITLE: CI Status
        SLACK_USERNAME: dvc-pkg-update
